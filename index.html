<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Navigation | Chandigarh University</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="hero-header">
        <h1>Campus Navigation</h1>
        <p class="subtitle">Chandigarh University Shortest Path Finder</p>
        <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
    </header>

    <main class="container">
        <!-- Controls Section -->
        <section class="glass-panel controls-section">
            <div class="input-group">
                <label for="start-node">Source Location</label>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <select id="start-node" class="styled-select"></select>
                    <button id="gps-btn" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 8px; padding: 0.5rem 0.8rem; cursor: pointer; color: white;" title="Use My Physical GPS Location">📍</button>
                </div>
            </div>
            
            <div class="form-group">
                <label for="end-node">Destination</label>
                <select id="end-node" class="styled-select">
                    <!-- Options populated by JS -->
                </select>
            </div>

            <button id="find-path-btn" class="primary-btn">
                <span>Find Shortest Path</span>
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
            </button>

            <button id="full-tour-btn" class="primary-btn" style="background: #8b5cf6;">
                <span>🎓 University Full Tour</span>
            </button>
        </section>

        <!-- View Section (Map + Results) -->
        <section class="view-section" style="position: relative;">
            
            <!-- Category Filters -->
            <div id="category-filters" class="glass-panel" style="padding: 0.8rem; margin-bottom: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; align-items: center; border-radius: 20px;">
                <span style="font-weight: 600; margin-right: 0.5rem;">Quick Directory:</span>
                <button class="filter-btn" data-category="All" style="background: #3b82f6; border-radius: 20px; padding: 0.3rem 0.8rem; border: none; cursor: pointer; color: white; font-weight: 600;">🌍 All</button>
                <button class="filter-btn" data-category="Hostel" style="background: rgba(255,255,255,0.2); border-radius: 20px; padding: 0.3rem 0.8rem; border: none; cursor: pointer; color: white;">🛏️ Hostels</button>
                <button class="filter-btn" data-category="Academic Block" style="background: rgba(255,255,255,0.2); border-radius: 20px; padding: 0.3rem 0.8rem; border: none; cursor: pointer; color: white;">📚 Academics</button>
                <button class="filter-btn" data-category="Sports Complex" style="background: rgba(255,255,255,0.2); border-radius: 20px; padding: 0.3rem 0.8rem; border: none; cursor: pointer; color: white;">⚽ Sports</button>
            </div>

            <div class="glass-panel map-container" style="padding: 1rem;">
                <!-- Live Tracking Dashboard Overlay -->
                <div id="live-dashboard" class="glass-panel" style="display: none; position: absolute; top: 1rem; left: 1rem; z-index: 1000; width: calc(100% - 2rem); margin: 0; padding: 1.5rem; border-radius: 12px; background: rgba(59, 130, 246, 0.9); color: white;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span id="walking-instruction" style="font-size: 1.2rem; font-weight: 800;">📍 Waiting for GPS...</span>
                        <div style="text-align: right;">
                            <span id="live-distance" style="font-size: 1.5rem; font-weight: 800; display: block;">0.00 km</span>
                            <span id="live-time" style="font-size: 1rem; opacity: 0.9;">0 min walk</span>
                        </div>
                    </div>
                </div>
                
                <div id="campus-map" style="width: 100%; height: 500px; border-radius: 16px; z-index: 1;"></div>
            </div>

            <div class="glass-panel result-container" id="result-box" style="display: none;">
                <h3>Navigation Route</h3>
                <div class="path-display" id="path-output"></div>
                <div class="distance-display">
                    Total Route Distance: <span id="distance-output" class="highlight-text">0</span> meters
                </div>
                <!-- Start Live Navigation trigger -->
                <button id="start-live-btn" class="primary-btn" style="margin: 1.5rem auto 0; background: #10b981;">
                    <span>🚶 Start Live Route Tracker</span>
                </button>
            </div>
            <div class="glass-panel error-container" id="error-box" style="display: none;">
                <p id="error-output"></p>
            </div>
        </section>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="script.js"></script>
</body>
</html>
